# Alembic configuration. The actual database URL is loaded from
# `app.core.settings.settings.DATABASE_URL` inside alembic/env.py, so it
# honours .env and env vars just like the running FastAPI app. Do not
# hardcode a URL here — leave `sqlalchemy.url` blank.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# File naming: zero-padded monotonic prefix + slug, e.g.
# `alembic/versions/0002_add_candles_index.py`. Makes the migration
# ordering obvious in the file listing and in code review.
file_template = %%(rev)s_%%(slug)s

sqlalchemy.url =


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
